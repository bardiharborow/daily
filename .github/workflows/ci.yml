name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-slim
    steps:
      - run: lscpu

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test
